<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌾 Gestión de Predios Agrícolas</title>
    <!-- Leaflet + Draw -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <!-- Papaparse y XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #eef2f5;
            touch-action: manipulation;
        }
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }
        #header {
            background: #1e2b38;
            color: white;
            padding: 6px 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            z-index: 10;
            min-height: 48px;
        }
        #header h1 {
            margin: 0;
            font-size: 0.85rem;
            flex: 1;
            min-width: 100px;
        }
        #controls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
        }
        #controls button {
            padding: 4px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.65rem;
            white-space: nowrap;
            min-height: 30px;
            touch-action: manipulation;
        }
        #controls button:disabled {
            background: #7f8c8d !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-purple { background: #8e44ad; color: white; }
        .btn-purple:hover { background: #6c3483; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #e67e22; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        #status {
            padding: 2px 8px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            font-size: 0.6rem;
            color: #ecf0f1;
            min-height: 26px;
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 80px;
            flex: 1;
            max-width: 160px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 0.55rem;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .badge.step { background: #3498db; }
        .badge.ready { background: #27ae60; }
        .file-input-wrapper {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(255,255,255,0.15);
            padding: 2px 6px;
            border-radius: 4px;
            max-width: 100px;
        }
        .file-input-wrapper input[type="file"] {
            padding: 2px;
            font-size: 0.55rem;
            background: transparent;
            border: none;
            color: white;
            max-width: 70px;
        }
        .file-input-wrapper input[type="file"]::file-selector-button {
            background: #3498db;
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.55rem;
        }
        #map-container {
            flex: 1;
            position: relative;
            min-height: 0;
            touch-action: none;
        }
        #map {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .map-toggle-container {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 1000;
            display: flex;
            gap: 3px;
            background: rgba(255,255,255,0.9);
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            backdrop-filter: blur(4px);
        }
        .map-toggle-container button {
            padding: 4px 8px;
            font-size: 0.55rem;
            border: none;
            border-radius: 3px;
            background: #ecf0f1;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            touch-action: manipulation;
            min-height: 28px;
        }
        .map-toggle-container button.active {
            background: #2ecc71;
            color: white;
        }
        #bottom-panel {
            background: white;
            border-top: 2px solid #ddd;
            padding: 6px 10px;
            max-height: 40vh;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        #bottom-panel .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid #ecf0f1;
        }
        #bottom-panel .panel-header h3 {
            margin: 0;
            font-size: 0.8rem;
            color: #2c3e50;
        }
        #bottom-panel .panel-header .count {
            font-weight: bold;
            color: #27ae60;
        }
        #bottom-panel .panel-header .acciones button {
            padding: 3px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.65rem;
            transition: 0.2s;
            min-height: 28px;
            touch-action: manipulation;
        }
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            margin-top: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .table-wrapper table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.6rem;
        }
        .table-wrapper th {
            background: #2c3e50;
            color: white;
            padding: 4px 4px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 2;
            font-size: 0.6rem;
        }
        .table-wrapper td {
            padding: 3px 4px;
            border-bottom: 1px solid #ecf0f1;
            vertical-align: middle;
            cursor: pointer;
            font-size: 0.6rem;
        }
        .table-wrapper tr:hover td { background: #f0f7ff; }
        .table-wrapper tr.editing td { background: #d4edda !important; border-left: 3px solid #28a745; }
        .table-wrapper tr.zoomed td { background: #cce5ff !important; border-left: 3px solid #007bff; }
        .table-wrapper .badge-cultivo {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }
        .table-wrapper .btn-accion {
            border: none;
            border-radius: 3px;
            padding: 1px 6px;
            cursor: pointer;
            font-size: 0.55rem;
            font-weight: bold;
            margin: 1px;
            touch-action: manipulation;
            min-height: 22px;
        }
        .table-wrapper .btn-accion.eliminar { background: #e74c3c; color: white; }
        .table-wrapper .btn-accion.editar { background: #f39c12; color: white; }
        .table-wrapper .btn-accion.exportar-kml { background: #8e44ad; color: white; }
        .empty-table {
            text-align: center;
            color: #7f8c8d;
            padding: 16px 0;
            font-style: italic;
            font-size: 0.75rem;
        }
        /* Modal mejorado para móvil */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 10px;
            backdrop-filter: blur(2px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white;
            padding: 16px 18px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            animation: modalIn 0.25s ease;
            -webkit-overflow-scrolling: touch;
        }
        @keyframes modalIn {
            from { transform: scale(0.95) translateY(10px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-content .close-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #7f8c8d;
            touch-action: manipulation;
            padding: 4px 8px;
        }
        .modal-content .close-btn:hover { color: #2c3e50; }
        .modal-content h3 {
            margin: 0 0 12px 0;
            color: #2c3e50;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 8px;
            font-size: 1rem;
        }
        .modal-content .form-group-modal {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .modal-content .form-group-modal .full-width {
            grid-column: span 2;
        }
        .modal-content .form-group-modal label {
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .modal-content .form-group-modal label .required {
            color: #e74c3c;
            font-size: 0.7rem;
        }
        .modal-content .form-group-modal input,
        .modal-content .form-group-modal select,
        .modal-content .form-group-modal textarea {
            padding: 6px 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 0.85rem;
            background: white;
            transition: border 0.2s;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
        }
        .modal-content .form-group-modal input:focus,
        .modal-content .form-group-modal select:focus,
        .modal-content .form-group-modal textarea:focus {
            border-color: #27ae60;
            outline: none;
            box-shadow: 0 0 0 3px rgba(39,174,96,0.15);
        }
        .modal-content .form-group-modal input.error,
        .modal-content .form-group-modal select.error {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.06);
        }
        .modal-content .form-group-modal textarea {
            resize: vertical;
            min-height: 50px;
        }
        .modal-content .btn-guardar {
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1;
        }
        .modal-content .btn-guardar:hover { background: #219a52; }
        .modal-content .btn-cancelar {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            flex: 1;
        }
        .modal-content .btn-cancelar:hover { background: #c0392b; }
        .modal-content .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .modal-content .modal-actions button { flex: 1; }
        .modal-content .error-msg {
            color: #e74c3c;
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }
        .modal-content .error-msg.visible { display: block; }
        .toast {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.75rem;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
            max-width: 92%;
            text-align: center;
            pointer-events: none;
        }
        .toast.success { background: #27ae60; }
        .toast.warning { background: #f39c12; }
        .toast.error { background: #e74c3c; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .color-picker-wrapper input[type="color"] {
            width: 34px;
            height: 34px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            cursor: pointer;
            padding: 2px;
        }
        /* Catálogo de simbología */
        .catalogo-container {
            background: white;
            padding: 6px 12px;
            border-top: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .catalogo-container label {
            font-weight: bold;
            font-size: 0.7rem;
            color: #2c3e50;
        }
        .catalogo-container select {
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #bdc3c7;
            font-size: 0.7rem;
            -webkit-appearance: none;
            appearance: none;
            background: white;
        }
        .catalogo-container .color-sample {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .catalogo-container .catalogo-items {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        .catalogo-container .catalogo-item {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.6rem;
            background: #f8f9fa;
            padding: 1px 6px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        /* Leaflet draw mobile adjustments */
        .leaflet-draw-toolbar a {
            background-size: 18px !important;
        }
        .leaflet-draw-toolbar .leaflet-draw-draw-polygon {
            background-position: 50% 50% !important;
        }
        /* Scrollbar styling */
        .table-wrapper::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #bdc3c7;
            border-radius: 4px;
        }
        /* Mobile specific */
        @media (max-width: 600px) {
            #header h1 { font-size: 0.7rem; min-width: 60px; }
            #controls button { font-size: 0.55rem; padding: 3px 6px; min-height: 26px; }
            #status { font-size: 0.5rem; min-width: 60px; max-width: 100px; }
            .file-input-wrapper { max-width: 75px; }
            .file-input-wrapper input[type="file"] { max-width: 50px; font-size: 0.5rem; }
            .modal-content .form-group-modal { grid-template-columns: 1fr; }
            .modal-content .form-group-modal .full-width { grid-column: span 1; }
            .modal-content { padding: 14px 12px; }
            .catalogo-container { padding: 4px 8px; gap: 4px; }
            .catalogo-container label { font-size: 0.6rem; }
            .catalogo-container select { font-size: 0.6rem; padding: 2px 6px; }
            .catalogo-container .catalogo-item { font-size: 0.5rem; padding: 1px 4px; }
            .map-toggle-container { top: 4px; right: 4px; padding: 3px; gap: 2px; }
            .map-toggle-container button { font-size: 0.5rem; padding: 3px 6px; min-height: 24px; }
            #bottom-panel { max-height: 35vh; padding: 4px 6px; }
            #bottom-panel .panel-header h3 { font-size: 0.7rem; }
            .table-wrapper table { font-size: 0.5rem; }
            .table-wrapper th { font-size: 0.5rem; padding: 3px 3px; }
            .table-wrapper td { font-size: 0.5rem; padding: 2px 3px; }
            .table-wrapper .badge-cultivo { font-size: 0.45rem; padding: 1px 4px; }
            .table-wrapper .btn-accion { font-size: 0.5rem; padding: 1px 4px; min-height: 18px; }
            .toast { font-size: 0.65rem; padding: 6px 12px; bottom: 6px; }
        }
        @media (max-width: 400px) {
            #header { padding: 4px 6px; min-height: 40px; }
            #controls button { font-size: 0.5rem; padding: 2px 5px; min-height: 22px; }
            .file-input-wrapper input[type="file"] { max-width: 40px; }
            #status { max-width: 70px; font-size: 0.45rem; }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            #bottom-panel { max-height: 30vh; }
            .modal-content { max-height: 85vh; }
        }
    </style>
</head>
<body>

<div id="header">
    <h1>🌾 Predios</h1>
    <div id="controls">
        <span id="status"><span class="badge step">Paso</span> Dibuja</span>
        <button class="btn-primary" id="btnDrawPolygon">✏️ Dibujar</button>
        <button class="btn-success" id="btnExportCSV" disabled>📥 CSV</button>
        <button class="btn-purple" id="btnExportKML" disabled>📥 KML</button>
        <button class="btn-warning" id="btnFormatoArraigo" disabled>📋 Arraigo</button>
        <button class="btn-secondary" id="btnRecuperar" title="Recuperar">🔄</button>
        <button class="btn-secondary" id="btnBorrarMemoria" title="Borrar memoria">🗑️</button>
        <div class="file-input-wrapper">
            <input type="file" id="csvFile" accept=".csv,.txt,.xlsx,.xls" />
        </div>
    </div>
</div>

<div id="map-container">
    <div id="map">
        <div class="map-toggle-container">
            <button id="btnHybrid" class="active">🛰️</button>
            <button id="btnStreet">🗺️</button>
            <button id="btnTerrain">⛰️</button>
        </div>
    </div>
</div>

<!-- Catálogo de simbología -->
<div class="catalogo-container" id="catalogoContainer">
    <label>🎨 Simbología:</label>
    <select id="catalogoSelect">
        <option value="cultivo">Cultivo</option>
        <option value="modalidad">Modalidad</option>
    </select>
    <div class="catalogo-items" id="catalogoItems"></div>
</div>

<div id="bottom-panel">
    <div class="panel-header">
        <h3>📊 Predios <span class="count" id="predio-counter">0</span></h3>
        <div class="acciones">
            <button class="btn-danger" id="btnEliminarTodos" disabled>🗑️ Todos</button>
        </div>
    </div>
    <div class="table-wrapper" id="table-wrapper">
        <div class="empty-table">🗺️ Dibuja un polígono o carga archivo</div>
    </div>
</div>

<!-- Modal guardar/editar -->
<div class="modal-overlay" id="modalGuardar">
    <div class="modal-content">
        <button class="close-btn" id="closeModalGuardar">&times;</button>
        <h3 id="modalTitle">📝 Registrar Predio</h3>
        <div class="form-group-modal">
            <label>📝 Nombre <span class="required">*</span>
                <input type="text" id="modalNombre" placeholder="Ej: Lote 5" />
            </label>
            <label>🌱 Cultivo <span class="required">*</span>
                <select id="modalCultivo"><option value="">Seleccionar</option></select>
            </label>
            <label>💧 Modalidad <span class="required">*</span>
                <select id="modalModalidad">
                    <option value="">Seleccionar</option>
                    <option value="Riego">Riego</option>
                    <option value="Temporal">Temporal</option>
                </select>
            </label>
            <label>📅 Fecha solicitud <span class="required">*</span>
                <input type="date" id="modalFechaSolicitud" />
            </label>
            <label>📅 Fecha arraigo
                <input type="date" id="modalFechaArraigo" />
            </label>
            <label>📍 Estado <span class="required">*</span>
                <select id="modalEstado"><option value="">Seleccionar</option></select>
            </label>
            <label>🏙️ Municipio <span class="required">*</span>
                <select id="modalMunicipio"><option value="">Seleccionar</option></select>
            </label>
            <label>👤 Propietario <span class="required">*</span>
                <input type="text" id="modalDueno" placeholder="Nombre" />
            </label>
            <label>📌 Tipo <span class="required">*</span>
                <input type="text" id="modalTipo" placeholder="Ej: Agrícola" />
            </label>
            <label class="full-width">📋 Características
                <textarea id="modalCaracteristicas" maxlength="1000" placeholder="Máx 1000 caracteres"></textarea>
            </label>
            <label class="full-width">📝 Observaciones
                <textarea id="modalObservaciones" maxlength="1000" placeholder="Máx 1000 caracteres"></textarea>
            </label>
        </div>
        <div class="error-msg" id="modalError">⚠️ Todos los campos obligatorios (*) deben llenarse.</div>
        <div class="modal-actions">
            <button class="btn-cancelar" id="btnCancelarModal">Cancelar</button>
            <button class="btn-guardar" id="btnGuardarModal">✅ Guardar</button>
        </div>
    </div>
</div>

<!-- Modal info -->
<div class="modal-overlay" id="modalInfo">
    <div class="modal-content">
        <button class="close-btn" id="closeModalInfo">&times;</button>
        <h3>📋 Formato válido</h3>
        <p style="font-size:0.8rem;">Archivos: CSV, TXT, Excel</p>
        <p style="font-size:0.75rem;">Columnas: ID, LAT, LON, NOMBRE, DUENO, USUARIO, CULTIVO, FECHA_SIEMBRA, ESTADO, MUNICIPIO</p>
        <button class="btn-success" style="padding:6px 16px;border:none;border-radius:4px;cursor:pointer;margin-top:8px;width:100%;" id="btnCerrarInfo">Entendido</button>
    </div>
</div>

<script>
    // ============================================================

    function dms(decimal, isLat) {
        const abs = Math.abs(decimal);
        const d = Math.floor(abs);
        const m = Math.floor((abs - d) * 60);
        const s = ((abs - d - m/60) * 3600).toFixed(2);
        const dir = isLat ? (decimal>=0?'N':'S') : (decimal>=0?'E':'O');
        return `${d}°${m}'${s}"${dir}`;
    }

    function calcularArea(latLngs) {
        const R = 6371000;
        const toRad = deg => deg * Math.PI / 180;
        let a = 0;
        const n = latLngs.length;
        for (let i=0; i<n; i++) {
            const j = (i+1)%n;
            a += (toRad(latLngs[j].lng) - toRad(latLngs[i].lng)) *
                (2 + Math.sin(toRad(latLngs[i].lat)) + Math.sin(toRad(latLngs[j].lat)));
        }
        return Math.abs(a * R * R / 2);
    }

    function fmtArea(m2) {
        return { ha: (m2/10000).toFixed(4), m2: m2.toFixed(2) };
    }

    function toast(msg, type='info') {
        document.querySelector('.toast')?.remove();
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
    }

    function status(msg) {
        const el = document.getElementById('status');
        const cls = msg.includes('✅') ? 'ready' : 'step';
        const label = msg.includes('✅') ? '✓' : 'Paso';
        el.innerHTML = `<span class="badge ${cls}">${label}</span> ${msg.substring(0,20)}${msg.length>20?'…':''}`;
    }

    function download(content, filename, mime) {
        const blob = new Blob(['\uFEFF' + content], { type: `${mime};charset=utf-8;` });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    }

            };
            localStorage.setItem('prediosData', JSON.stringify(data));
        } catch(e) { console.warn('No se pudo guardar estado', e); }
    }

    function cargarEstado() {
        try {
            const raw = localStorage.getItem('prediosData');
            if (!raw) return false;
            const data = JSON.parse(raw);
            if (!data.predios || !data.predios.length) return false;

            if (data.catalogoModo) {
                state.catalogoModo = data.catalogoModo;
                document.getElementById('catalogoSelect').value = data.catalogoModo;
            }

            let count = 0;
            data.predios.forEach(pData => {
                const coords = pData.vertices.map(v => [v.lat, v.lng]);
                const poly = L.polygon(coords, { color: pData.color || '#27ae60', weight: 3 });
                drawnItems.addLayer(poly);
                const vertices = pData.vertices.map(v => ({ 
                    lat: v.lat, lng: v.lng, latDMS: dms(v.lat, true), lngDMS: dms(v.lng, false) 
                }));
                const predio = {
                    id: pData.id || `PRED-${String(count+1).padStart(4,'0')}`,
                    nombre: pData.nombre || `Polígono ${count+1}`,
                    cultivo: pData.cultivo || '',
                    modalidad: pData.modalidad || '',
                    fechaSolicitud: pData.fechaSolicitud || '',
                    fechaArraigo: pData.fechaArraigo || '',
                    estado: pData.estado || '',
                    municipio: pData.municipio || '',
                    dueno: pData.dueno || '',
                    tipo: pData.tipo || '',
                    caracteristicas: pData.caracteristicas || '',
                    observaciones: pData.observaciones || '',
                    color: pData.color || '#27ae60',
                    areaHa: pData.areaHa || 0,
                    vertices: vertices,
                    layer: poly,
                    centroide: { lat: pData.centroideLat, lng: pData.centroideLng },
                    centroideLat: pData.centroideLat || 0,
                    centroideLng: pData.centroideLng || 0,
                };
                state.predios.push(predio);
                count++;
            });
            state.counter = data.counter || count;
            actualizarCatalogo();
            renderTabla();
            toast(`🔄 ${count} predios recuperados`, 'info');
            return true;
        } catch(e) {
            console.warn('Error al cargar estado', e);
            return false;
        }
    }

    function borrarMemoria() {
        if (state.predios.length === 0) {
            toast('No hay predios en memoria', 'warning');
            return;
        }
        if (!confirm('¿Borrar todos los predios guardados en memoria?')) return;
        localStorage.removeItem('prediosData');
        state.predios = [];
        state.counter = 0;
        state.pendingLayer = null;
        state.editingIndex = null;
        state.zoomedIndex = null;
        drawnItems.clearLayers();
        actualizarCatalogo();
        renderTabla();
        toast('🗑️ Memoria borrada', 'warning');
    }

    // ============================================================
    // 6. CATÁLOGO DE SIMBOLOGÍA
    // ============================================================
    function actualizarCatalogo() {
        const modo = state.catalogoModo;
        const container = document.getElementById('catalogoItems');
        let html = '';
        
        if (modo === 'cultivo') {
            for (const [cultivo, color] of Object.entries(COLOR_CULTIVO)) {
                html += `<span class="catalogo-item">
                    <span class="color-sample" style="background:${color};"></span>
                    ${cultivo}
                </span>`;
            }
        } else if (modo === 'modalidad') {
            for (const [modalidad, color] of Object.entries(COLOR_MODALIDAD)) {
                html += `<span class="catalogo-item">
                    <span class="color-sample" style="background:${color};"></span>
                    ${modalidad}
                </span>`;
            }
        }
        container.innerHTML = html;
        
        state.predios.forEach(p => {
            let color = '#27ae60';
            if (modo === 'cultivo') {
                color = COLOR_CULTIVO[p.cultivo] || '#27ae60';
            } else if (modo === 'modalidad') {
                color = COLOR_MODALIDAD[p.modalidad] || '#27ae60';
            }
            p.color = color;
            if (p.layer) {
                p.layer.setStyle({ color: color, fillColor: color });
            }
        });
        renderTabla();
        guardarEstado();
    }

    // ============================================================
    // 7. RENDERIZAR TABLA Y VALIDAR EXPORTACIÓN
    // ============================================================
    function verificarCamposCompletos() {
        return state.predios.every(p => 
            p.nombre && p.cultivo && p.modalidad && p.fechaSolicitud && 
            p.estado && p.municipio && p.dueno && p.tipo
        );
    }

    function renderTabla() {
        const wrapper = document.getElementById('table-wrapper');
        if (!state.predios.length) {
            wrapper.innerHTML = `<div class="empty-table">🗺️ Dibuja un polígono o carga archivo</div>`;
            document.getElementById('predio-counter').textContent = '0';
            document.getElementById('btnExportCSV').disabled = true;
            document.getElementById('btnExportKML').disabled = true;
            document.getElementById('btnFormatoArraigo').disabled = true;
            document.getElementById('btnEliminarTodos').disabled = true;
            return;
        }

        let html = `<table>
          <thead><tr>
            <th>Nombre</th><th>Cultivo</th><th>Prop.</th>
            <th>Área</th><th>Vért.</th><th>Acciones</th>
          </tr></thead><tbody>`;

        state.predios.forEach((p, idx) => {
            const color = p.color || '#27ae60';
            let rowClass = '';
            if (state.editingIndex === idx) rowClass += ' editing';
            if (state.zoomedIndex === idx) rowClass += ' zoomed';
            const incompleto = !p.nombre || !p.cultivo || !p.modalidad || !p.fechaSolicitud || !p.estado || !p.municipio || !p.dueno || !p.tipo;
            if (incompleto) rowClass += ' incomplete';
            html += `<tr class="${rowClass}" data-idx="${idx}">
              <td><strong>${p.nombre.substring(0,10)}${p.nombre.length>10?'…':''}${incompleto ? '⚠️' : ''}</strong></td>
              <td><span class="badge-cultivo" style="background:${color}">${p.cultivo.substring(0,6)}</span></td>
              <td>${p.dueno ? p.dueno.substring(0,6) : '-'}</td>
              <td>${p.areaHa}</td>
              <td>${p.vertices.length}</td>
              <td>
                <button class="btn-accion editar" onclick="editarPredio(${idx})">✏️</button>
                <button class="btn-accion exportar-kml" onclick="exportarKMLIndividual(${idx})">📥</button>
                <button class="btn-accion eliminar" onclick="eliminarPredio(${idx})">✕</button>
              </td>
            </tr>`;
        });

        html += `</tbody></table>`;
        wrapper.innerHTML = html;

        document.querySelectorAll('#table-wrapper tbody tr').forEach(tr => {
            tr.addEventListener('click', function(e) {
                if (e.target.tagName === 'BUTTON') return;
                const idx = parseInt(this.dataset.idx);
                const p = state.predios[idx];
                if (p && p.layer) {
                    state.zoomedIndex = idx;
                    map.fitBounds(p.layer.getBounds(), { padding: [20,20] });
                    renderTabla();
                    toast(`📍 Zoom a ${p.nombre}`, 'info');
                }
            });
        });

        document.getElementById('predio-counter').textContent = state.predios.length;
        const has = state.predios.length > 0;
        const allComplete = verificarCamposCompletos();
        document.getElementById('btnExportCSV').disabled = !has || !allComplete;
        document.getElementById('btnExportKML').disabled = !has || !allComplete;
        document.getElementById('btnFormatoArraigo').disabled = !has || !allComplete;
        document.getElementById('btnEliminarTodos').disabled = !has;
        
        if (has && !allComplete) {
            // toast silencioso para no saturar
        }
        
        guardarEstado();
    }

    // ============================================================
    // 8. FUNCIONES GLOBALES
    // ============================================================
    window.eliminarPredio = function(idx) {
        if (!confirm('¿Eliminar este predio?')) return;
        const p = state.predios[idx];
        if (p.layer) drawnItems.removeLayer(p.layer);
        state.predios.splice(idx, 1);
        if (state.editingIndex === idx) state.editingIndex = null;
        else if (state.editingIndex > idx) state.editingIndex--;
        if (state.zoomedIndex === idx) state.zoomedIndex = null;
        else if (state.zoomedIndex > idx) state.zoomedIndex--;
        renderTabla();
        toast('🗑️ Predio eliminado', 'warning');
    };

    // ============================================================
    // 9. GUARDAR/ACTUALIZAR PREDIO
    // ============================================================
    function guardarPredio() {
        const nombre = document.getElementById('modalNombre').value.trim();
        const cultivo = document.getElementById('modalCultivo').value;
        const modalidad = document.getElementById('modalModalidad').value;
        const fechaSolicitud = document.getElementById('modalFechaSolicitud').value;
        const fechaArraigo = document.getElementById('modalFechaArraigo').value;
        const estado = document.getElementById('modalEstado').value;
        const municipio = document.getElementById('modalMunicipio').value;
        const dueno = document.getElementById('modalDueno').value.trim();
        const tipo = document.getElementById('modalTipo').value.trim();
        const caracteristicas = document.getElementById('modalCaracteristicas').value.trim().slice(0,1000);
        const observaciones = document.getElementById('modalObservaciones').value.trim().slice(0,1000);

        const errorEl = document.getElementById('modalError');
        if (!nombre || !cultivo || !modalidad || !fechaSolicitud || !estado || !municipio || !dueno || !tipo) {
            errorEl.classList.add('visible');
            document.querySelectorAll('.form-group-modal input, .form-group-modal select').forEach(el => {
                if (!el.value) el.classList.add('error');
                else el.classList.remove('error');
            });
            return;
        }
        errorEl.classList.remove('visible');
        document.querySelectorAll('.form-group-modal input, .form-group-modal select').forEach(el => el.classList.remove('error'));

        let color = '#27ae60';
        if (state.catalogoModo === 'cultivo') {
            color = COLOR_CULTIVO[cultivo] || '#27ae60';
        } else if (state.catalogoModo === 'modalidad') {
            color = COLOR_MODALIDAD[modalidad] || '#27ae60';
        }

        if (state.editingIndex !== null) {
            const p = state.predios[state.editingIndex];
            p.nombre = nombre;
            p.cultivo = cultivo;
            p.modalidad = modalidad;
            p.fechaSolicitud = fechaSolicitud;
            p.fechaArraigo = fechaArraigo;
            p.estado = estado;
            p.municipio = municipio;
            p.dueno = dueno;
            p.tipo = tipo;
            p.caracteristicas = caracteristicas;
            p.observaciones = observaciones;
            p.color = color;
            if (p.layer) {
                p.layer.setStyle({ color: color, fillColor: color });
            }
            toast(`✅ "${nombre}" actualizado`, 'success');
            state.editingIndex = null;
            document.getElementById('btnGuardarModal').textContent = '✅ Guardar';
            document.getElementById('modalTitle').textContent = '📝 Registrar Predio';
            actualizarCatalogo();
            renderTabla();
            document.getElementById('modalGuardar').classList.remove('active');
            return;
        }

        if (!state.pendingLayer) {
            toast('❌ No hay polígono pendiente', 'warning');
            return;
        }

        const layer = state.pendingLayer;
        const latLngs = layer.getLatLngs()[0] || layer.getLatLngs();
        const vertices = latLngs.map(ll => ({ lat: ll.lat, lng: ll.lng, latDMS: dms(ll.lat, true), lngDMS: dms(ll.lng, false) }));
        const area = fmtArea(calcularArea(latLngs));
        layer.setStyle({ color: color, fillColor: color });
        const bounds = layer.getBounds();
        const center = bounds.getCenter();

        const predio = {
            id: `PRED-${String(state.counter+1).padStart(4,'0')}`,
            nombre, cultivo, modalidad, fechaSolicitud, fechaArraigo,
            estado, municipio, dueno, tipo,
            caracteristicas, observaciones,
            color: color,
            areaHa: parseFloat(area.ha),
            vertices,
            layer,
            centroide: center,
            centroideLat: center.lat,
            centroideLng: center.lng,
        };

        state.predios.push(predio);
        state.counter++;
        actualizarCatalogo();
        renderTabla();
        toast(`✅ "${nombre}" registrado`, 'success');
        status(`✅ Predio guardado`);
        state.pendingLayer = null;
        document.getElementById('modalGuardar').classList.remove('active');
        limpiarModal();
    }

        document.getElementById('modalNombre').value = '';
        document.getElementById('modalCultivo').value = '';
        document.getElementById('modalModalidad').value = '';
        document.getElementById('modalFechaSolicitud').value = '';

        document.getElementById('modalTipo').value = '';
        document.getElementById('modalCaracteristicas').value = '';

        document.getElementById('btnGuardarModal').textContent = '✅ Guardar';

    // ============================================================
    // 10. EXPORTACIONES
    // ============================================================
    async function obtenerUbicacionReal(lat, lng) {
        try {
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=10&addressdetails=1`;
            const response = await fetch(url);
            if (!response.ok) throw new Error('Error en geocodificación');
            const data = await response.json();
            if (data && data.address) {
                const address = data.address;
                const estado = address.state || address.region || address.state_district || 'México';
                const municipio = address.municipality || address.city || address.town || address.village || address.county || 'Desconocido';
                const localidad = address.suburb || address.neighbourhood || address.hamlet || address.village || address.town || 'Centro';
                return { estado, municipio, localidad };
            }
        } catch(e) { console.warn('Error geocodificación:', e); }
        return { estado: 'México', municipio: 'Ciudad de México', localidad: 'Centro' };
    }

    function exportCSV() {
        if (!state.predios.length) return;
        if (!verificarCamposCompletos()) {
            toast('❌ Campos incompletos', 'warning');
            return;
        }
        const headers = ['ID','NOMBRE','CULTIVO','MODALIDAD','FECHA_SOLICITUD','FECHA_ARRAIGO',
            'ESTADO','MUNICIPIO','PROPIETARIO','TIPO','CARACTERISTICAS','OBSERVACIONES',
            'SUPERFICIE_ha','CENTROIDE_LAT_LON','VERTICES_DD',
            'ESTADO_CENTROIDE','MUNICIPIO_CENTROIDE','LOCALIDAD_CENTROIDE','VERTICES_DMS'];
        
        Promise.all(state.predios.map(async (p) => {
            const centroideStr = `${p.centroideLat.toFixed(6)},${p.centroideLng.toFixed(6)}`;
            const dd = p.vertices.map(v => `${v.lat.toFixed(6)},${v.lng.toFixed(6)}`).join(';');
            const dmsStr = p.vertices.map(v => `${v.latDMS},${v.lngDMS}`).join(';');
            const ubicacion = await obtenerUbicacionReal(p.centroideLat, p.centroideLng);
            return {
                row: [
                    `"${p.id}"`,`"${p.nombre}"`,`"${p.cultivo}"`,`"${p.modalidad}"`,
                    p.fechaSolicitud||'', p.fechaArraigo||'',
                    `"${p.estado||''}"`,`"${p.municipio||''}"`,
                    `"${p.dueno||''}"`,`"${p.tipo||''}"`,
                    `"${p.caracteristicas||''}"`,`"${p.observaciones||''}"`,
                    p.areaHa.toFixed(4),
                    `"${centroideStr}"`,
                    `"${dd}"`,
                    `"${ubicacion.estado}"`,`"${ubicacion.municipio}"`,`"${ubicacion.localidad}"`,
                    `"${dmsStr}"`
                ]
            };
        })).then(results => {
            let csv = headers.join(',') + '\n';
            results.forEach(r => csv += r.row.join(',') + '\n');
            download(csv, `predios_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
            toast('📥 CSV exportado', 'success');
        }).catch(err => {
            console.error('Error CSV:', err);
            toast('Error al exportar CSV', 'error');
        });
    }

          <tr><td><b>Municipio</b></td><td>${p.municipio || '-'}</td></tr>
          <tr><td><b>Propietario</b></td><td>${p.dueno || '-'}</td></tr>
          <tr><td><b>Tipo</b></td><td>${p.tipo || '-'}</td></tr>
          <tr><td><b>Características</b></td><td>${p.caracteristicas || '-'}</td></tr>
          <tr><td><b>Observaciones</b></td><td>${p.observaciones || '-'}</td></tr>
          <tr><td><b>Área (ha)</b></td><td>${p.areaHa}</td></tr>
          <tr><td><b>Vértices</b></td><td>${p.vertices.length}</td></tr>
        </table>
      ]]></description>
      <Polygon><outerBoundaryIs><LinearRing><coordinates>${coordsString}</coordinates></LinearRing></outerBoundaryIs></Polygon>
    </Placemark>`;
        });
        kml += `</Document></kml>`;
        download(kml, `predios_${new Date().toISOString().slice(0,10)}.kml`, 'application/vnd.google-earth.kml+xml');
        toast('📥 KML exportado', 'success');
    }

    // ============================================================
    // 11. FORMATO ARRAIGO (Excel)
    // ============================================================
    function exportFormatoArraigo() {
        if (!state.predios.length) return;
        if (!verificarCamposCompletos()) {
            toast('❌ Campos incompletos', 'warning');
            return;
        }
        const data = [];
        state.predios.forEach(p => {
            const row = {
                'FOLIO': p.id || '',
                'CULTIVO': p.cultivo || '',
                'MODALIDAD': p.modalidad || '',
                'FECHA DE SIEMBRA SOLICITUD': p.fechaSolicitud || '',
                'FECHA DE SIEMBRA ARRAIGO': p.fechaArraigo || '',
                'ESTADO DEL RIESGO': p.estado || '',
                'MUNICIPIO DEL RIESGO': p.municipio || '',
                'NOMBRE DEL PREDIO': p.nombre || '',
                'NÚMERO DE HECTÁREAS': parseFloat(p.areaHa).toFixed(4),
            };
            
            p.vertices.forEach((v, index) => {
                const suffix = index === 0 ? '' : (index + 1);
                const latDMS = v.latDMS || '';
                const lngDMS = v.lngDMS || '';
                
                let latG = '', latM = '', latS = '';
                let lngG = '', lngM = '', lngS = '';
                
                if (latDMS) {
                    const parts = latDMS.match(/(\d+)°(\d+)'([\d.]+)"[NS]/);
                    if (parts) {
                        latG = parts[1];
                        latM = parts[2];
                        latS = parts[3];
                    }
                }
                
                if (lngDMS) {
                    const parts = lngDMS.match(/(\d+)°(\d+)'([\d.]+)"[EW]/);
                    if (parts) {
                        lngG = parts[1];
                        lngM = parts[2];
                        lngS = parts[3];
                    }
                }
                
                if (!latG && v.lat !== undefined) {
                    const absLat = Math.abs(v.lat);
                    latG = Math.floor(absLat).toString();
                    const remainder = (absLat - parseInt(latG)) * 60;
                    latM = Math.floor(remainder).toString();
                    latS = ((remainder - parseInt(latM)) * 60).toFixed(2);
                }
                
                if (!lngG && v.lng !== undefined) {
                    const absLng = Math.abs(v.lng);
                    lngG = Math.floor(absLng).toString();
                    const remainder = (absLng - parseInt(lngG)) * 60;
                    lngM = Math.floor(remainder).toString();
                    lngS = ((remainder - parseInt(lngM)) * 60).toFixed(2);
                }
                
                const latLabel = index === 0 ? 'LATITUD N GRADOS' : `LATITUD N GRADOS${index + 1}`;
                const latMinLabel = index === 0 ? 'LATITUD N MINUTOS' : `LATITUD N MINUTOS${index + 1}`;
                const latSegLabel = index === 0 ? 'LATITUD N SEGUNDOS' : `LATITUD N SEGUNDOS${index + 1}`;
                const lngLabel = index === 0 ? 'LONGITUD O GRADOS' : `LONGITUD O GRADOS${index + 1}`;
                const lngMinLabel = index === 0 ? 'LONGITUD O MINUTOS' : `LONGITUD O MINUTOS${index + 1}`;
                const lngSegLabel = index === 0 ? 'LONGITUD O SEGUNDOS' : `LONGITUD O SEGUNDOS${index + 1}`;
                
                row[latLabel] = latG;
                row[latMinLabel] = latM;
                row[latSegLabel] = latS;
                row[lngLabel] = lngG;
                row[lngMinLabel] = lngM;
                row[lngSegLabel] = lngS;
            });
            
            data.push(row);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, 'Hoja1');
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `FormatoArraigo_${new Date().toISOString().slice(0,10)}.xlsx`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        toast('📋 Formato Arraigo exportado', 'success');
    }

    // ============================================================
    // 12. CARGA DE ARCHIVOS
    // ============================================================
    function cargarArchivo(file) {
        const isExcel = /\.xlsx?$/i.test(file.name);
        const reader = new FileReader();
        reader.onload = async function(ev) {
            let data;
            if (isExcel) {
                const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                const sheet = wb.Sheets[wb.SheetNames[0]];
                data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            } else {
                const result = Papa.parse(ev.target.result, { header: false, skipEmptyLines: true, dynamicTyping: true });
                data = result.data;
            }

            let startRow = 3;
            let headerRow = -1;
            for (let i = 0; i < Math.min(data.length, 10); i++) {
                const row = data[i];
                if (!row || row.length < 3) continue;
                const rowStr = row.map(String).join(' ').toUpperCase();
                if (rowStr.includes('LATITUD') || rowStr.includes('GRADOS') || rowStr.includes('MINUTOS')) {
                    headerRow = i;
                    break;
                }
            }
            if (headerRow >= 0) startRow = headerRow + 1;

            let colStart = 9;
            if (headerRow >= 0 && data[headerRow]) {
                const header = data[headerRow].map(String);
                for (let j = 0; j < header.length; j++) {
                    if (header[j].toUpperCase().includes('ESQUINA') || header[j].toUpperCase().includes('LATITUD')) {
                        colStart = j;
                        break;
                    }
                }
            }

            let headerMap = {};
            if (headerRow >= 0 && data[headerRow]) {
                const header = data[headerRow].map(String);
                const posibles = {
                    'FECHA_SOLICITUD': ['FECHA DE SIEMBRA SOLICITUD', 'FECHA_SOLICITUD'],
                    'FECHA_ARRAIGO': ['FECHA DE SIEMBRA ARRAIGO', 'FECHA_ARRAIGO'],
                    'ESTADO': ['ESTADO DEL RIESGO', 'ESTADO'],
                    'MUNICIPIO': ['MUNICIPIO DEL RIESGO', 'MUNICIPIO'],
                    'PROPIETARIO': ['PROPIETARIO', 'DUENO', 'NOMBRE PROPIETARIO'],
                    'TIPO': ['TIPO', 'TIPO DE PREDIO'],
                    'CARACTERISTICAS': ['CARACTERISTICAS', 'CARACTERÍSTICAS'],
                    'OBSERVACIONES': ['OBSERVACIONES', 'OBSERVACIONES GENERALES']
                };
                for (const [key, variants] of Object.entries(posibles)) {
                    for (let j = 0; j < header.length; j++) {
                        const h = header[j].toUpperCase().trim();
                        if (variants.some(v => h.includes(v.toUpperCase()))) {
                            headerMap[key] = j;
                            break;
                        }
                    }
                }
            }

            const polygons = {};
            const attrs = {};
            
            for (let i = startRow; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length < colStart + 6) continue;
                
                let id = row[0] ? String(row[0]).trim() : `POL-${i}`;
                if (!id || id === '') id = `POL-${i}`;
                
                let coords = [];
                let col = colStart;
                while (col + 5 < row.length) {
                    const latG = parseFloat(row[col]);
                    const latM = parseFloat(row[col+1]);
                    const latS = parseFloat(row[col+2]);
                    const lonG = parseFloat(row[col+3]);
                    const lonM = parseFloat(row[col+4]);
                    const lonS = parseFloat(row[col+5]);
                    
                    if (!isNaN(latG) && !isNaN(latM) && !isNaN(latS) && 
                        !isNaN(lonG) && !isNaN(lonM) && !isNaN(lonS)) {
                        const lat = latG + latM/60 + latS/3600;
                        const lon = -(lonG + lonM/60 + lonS/3600);
                        coords.push([lat, lon]);
                        col += 6;
                    } else {
                        break;
                    }
                }
                
                if (coords.length < 3) continue;
                
                if (!polygons[id]) polygons[id] = [];
                polygons[id] = coords;
                
                if (!attrs[id]) {
                    attrs[id] = {};
                    if (headerMap['FECHA_SOLICITUD'] !== undefined && row[headerMap['FECHA_SOLICITUD']]) {
                        attrs[id].fechaSolicitud = String(row[headerMap['FECHA_SOLICITUD']]).trim();
                    }
                    if (headerMap['FECHA_ARRAIGO'] !== undefined && row[headerMap['FECHA_ARRAIGO']]) {
                        attrs[id].fechaArraigo = String(row[headerMap['FECHA_ARRAIGO']]).trim();
                    }
                    if (headerMap['ESTADO'] !== undefined && row[headerMap['ESTADO']]) {
                        attrs[id].estado = String(row[headerMap['ESTADO']]).trim();
                    }
                    if (headerMap['MUNICIPIO'] !== undefined && row[headerMap['MUNICIPIO']]) {
                        attrs[id].municipio = String(row[headerMap['MUNICIPIO']]).trim();
                    }
                    if (headerMap['PROPIETARIO'] !== undefined && row[headerMap['PROPIETARIO']]) {
                        attrs[id].dueno = String(row[headerMap['PROPIETARIO']]).trim();
                    }
                    if (headerMap['TIPO'] !== undefined && row[headerMap['TIPO']]) {
                        attrs[id].tipo = String(row[headerMap['TIPO']]).trim();
                    }
                    if (headerMap['CARACTERISTICAS'] !== undefined && row[headerMap['CARACTERISTICAS']]) {
                        attrs[id].caracteristicas = String(row[headerMap['CARACTERISTICAS']]).trim();
                    }
                    if (headerMap['OBSERVACIONES'] !== undefined && row[headerMap['OBSERVACIONES']]) {
                        attrs[id].observaciones = String(row[headerMap['OBSERVACIONES']]).trim();
                    }
                    const colNombre = 7;
                    const colCultivo = 1;
                    const colModalidad = 2;
                    if (row[colNombre]) attrs[id].nombre = String(row[colNombre]).trim();
                    if (row[colCultivo]) attrs[id].cultivo = String(row[colCultivo]).trim();
                    if (row[colModalidad]) attrs[id].modalidad = String(row[colModalidad]).trim();
                }
            }

            const ids = Object.keys(polygons);
            if (!ids.length) {
                toast('❌ No se encontraron polígonos válidos', 'warning');
                return;
            }

            let count = 0;
            for (const id of ids) {
                const coords = polygons[id];
                if (coords.length < 3) continue;
                const first = coords[0];
                const last = coords[coords.length-1];
                if (first[0] !== last[0] || first[1] !== last[1]) coords.push(first);
                const poly = L.polygon(coords, { color: '#27ae60', weight: 3 });
                drawnItems.addLayer(poly);

                const a = attrs[id] || {};
                const latLngs = poly.getLatLngs()[0] || poly.getLatLngs();
                const vertices = latLngs.map(ll => ({ lat: ll.lat, lng: ll.lng, latDMS: dms(ll.lat, true), lngDMS: dms(ll.lng, false) }));
                const area = fmtArea(calcularArea(latLngs));
                const bounds = poly.getBounds();
                const center = bounds.getCenter();

                const cultivo = a.cultivo || '';
                const modalidad = a.modalidad || '';
                let color = '#27ae60';
                if (state.catalogoModo === 'cultivo') {
                    color = COLOR_CULTIVO[cultivo] || '#27ae60';
                } else if (state.catalogoModo === 'modalidad') {
                    color = COLOR_MODALIDAD[modalidad] || '#27ae60';
                }
                poly.setStyle({ color: color, fillColor: color });

                const ubicacion = await obtenerUbicacionReal(center.lat, center.lng);

                const predio = {
                    id: id,
                    nombre: a.nombre || `Polígono ${id}`,
                    cultivo: cultivo,
                    modalidad: modalidad,
                    fechaSolicitud: a.fechaSolicitud || '',
                    fechaArraigo: a.fechaArraigo || '',
                    estado: ubicacion.estado,
                    municipio: ubicacion.municipio,
                    dueno: a.dueno || '',
                    tipo: a.tipo || '',
                    caracteristicas: a.caracteristicas || '',
                    observaciones: a.observaciones || '',
                    color: color,
                    areaHa: parseFloat(area.ha),
                    vertices: vertices,
                    layer: poly,
                    centroide: center,
                    centroideLat: center.lat,
                    centroideLng: center.lng,
                };
                state.predios.push(predio);
                state.counter++;
                count++;
            }

            actualizarCatalogo();
            renderTabla();
            toast(`✅ ${count} polígonos cargados`, 'success');
        };

        if (isExcel) reader.readAsArrayBuffer(file);
        else reader.readAsText(file, 'UTF-8');
    }

    // ============================================================
    // 13. EVENTOS
    // ============================================================

    document.getElementById('btnDrawPolygon').addEventListener('click', function() {
        new L.Draw.Polygon(map, drawControl.options.draw.polygon).enable();
        toast('✏️ Dibuja un polígono', 'info');
    });

    map.on('draw:created', function(e) {
        const layer = e.layer;
        if (layer instanceof L.Polygon) {
            drawnItems.addLayer(layer);
        } else {
            toast('❌ Solo polígonos', 'warning');
            return;
        }
        state.pendingLayer = layer;
        document.getElementById('modalNombre').value = '';
        document.getElementById('modalCultivo').value = '';
        document.getElementById('modalModalidad').value = '';
        document.getElementById('modalFechaSolicitud').value = '';
        document.getElementById('modalFechaArraigo').value = '';
        document.getElementById('modalDueno').value = '';
        document.getElementById('modalTipo').value = '';
        document.getElementById('modalCaracteristicas').value = '';
        document.getElementById('modalObservaciones').value = '';
        document.getElementById('modalTitle').textContent = '📝 Registrar Predio';
        document.getElementById('btnGuardarModal').textContent = '✅ Guardar';
        state.editingIndex = null;
        document.getElementById('modalGuardar').classList.add('active');
        document.getElementById('modalNombre').focus();
    });

    map.on('click', function(e) {
        state.predios.forEach((p, idx) => {
            if (p.layer && p.layer.getBounds().contains(e.latlng)) {
                state.zoomedIndex = idx;
                map.fitBounds(p.layer.getBounds(), { padding: [20,20] });
                renderTabla();
                toast(`📍 Zoom a ${p.nombre}`, 'info');
            }
        });
    });

    document.getElementById('btnHybrid').addEventListener('click', function() {
        if (currentView === 'hybrid') return;
        map.removeLayer(streetLayer);
        map.removeLayer(terrainLayer);
        hybridGroup.addTo(map);
        this.classList.add('active');
        document.getElementById('btnStreet').classList.remove('active');
        document.getElementById('btnTerrain').classList.remove('active');
        currentView = 'hybrid';
    });
    document.getElementById('btnStreet').addEventListener('click', function() {
        if (currentView === 'street') return;
        map.removeLayer(hybridGroup);
        map.removeLayer(terrainLayer);
        streetLayer.addTo(map);
        this.classList.add('active');
        document.getElementById('btnHybrid').classList.remove('active');
        document.getElementById('btnTerrain').classList.remove('active');
        currentView = 'street';
    });
    document.getElementById('btnTerrain').addEventListener('click', function() {
        if (currentView === 'terrain') return;
        map.removeLayer(hybridGroup);
        map.removeLayer(streetLayer);
        terrainLayer.addTo(map);
        this.classList.add('active');
        document.getElementById('btnHybrid').classList.remove('active');
        document.getElementById('btnStreet').classList.remove('active');
        currentView = 'terrain';
    });

    document.getElementById('btnGuardarModal').addEventListener('click', guardarPredio);
    document.getElementById('btnCancelarModal').addEventListener('click', function() {
        if (state.pendingLayer && state.editingIndex === null) {
            drawnItems.removeLayer(state.pendingLayer);
            state.pendingLayer = null;
        }
        document.getElementById('modalGuardar').classList.remove('active');
        limpiarModal();
        toast('❌ Cancelado', 'warning');
    });
    document.getElementById('closeModalGuardar').addEventListener('click', function() {
        if (state.pendingLayer && state.editingIndex === null) {
            drawnItems.removeLayer(state.pendingLayer);
            state.pendingLayer = null;
        }
        document.getElementById('modalGuardar').classList.remove('active');
        limpiarModal();
        toast('❌ Cancelado', 'warning');
    });

    const estadoSelect = document.getElementById('modalEstado');
    const municipioSelect = document.getElementById('modalMunicipio');
    Object.keys(ESTADOS_MUNICIPIOS).forEach(est => {
        const opt = document.createElement('option');
        opt.value = est;
        opt.textContent = est;
        estadoSelect.appendChild(opt);
    });
    estadoSelect.addEventListener('change', function() {
        const est = this.value;
        municipioSelect.innerHTML = '<option value="">Seleccionar</option>';
        if (est && ESTADOS_MUNICIPIOS[est]) {
            ESTADOS_MUNICIPIOS[est].forEach(mun => {
                const opt = document.createElement('option');
                opt.value = mun;
                opt.textContent = mun;
                municipioSelect.appendChild(opt);
            });
        }
    });

    const cultivoSelect = document.getElementById('modalCultivo');
    CULTIVOS.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        cultivoSelect.appendChild(opt);
    });

    document.getElementById('catalogoSelect').addEventListener('change', function() {
        state.catalogoModo = this.value;
        actualizarCatalogo();
        toast(`🎨 Simbología por ${this.value === 'cultivo' ? 'Cultivo' : 'Modalidad'}`, 'info');
    });

    document.getElementById('btnEliminarTodos').addEventListener('click', function() {
        if (!state.predios.length) return;
        if (!confirm('¿Eliminar TODOS los predios?')) return;
        drawnItems.clearLayers();
        state.predios = [];
        state.counter = 0;
        state.pendingLayer = null;
        state.editingIndex = null;
        state.zoomedIndex = null;
        renderTabla();
        document.getElementById('modalGuardar').classList.remove('active');
        limpiarModal();
        status('🗑️ Limpiado');
        toast('🗑️ Todos los predios eliminados', 'warning');
    });

    document.getElementById('btnRecuperar').addEventListener('click', function() {
        cargarEstado();
        toast('🔄 Predios recuperados', 'success');
    });

    document.getElementById('csvFile').addEventListener('change', function(e) {
        if (!this.files.length) return;
        const file = this.files[0];
        cargarArchivo(file);
        this.value = '';
    });

    document.getElementById('btnExportCSV').addEventListener('click', exportCSV);
    document.getElementById('btnExportKML').addEventListener('click', exportKML);
    document.getElementById('btnFormatoArraigo').addEventListener('click', exportFormatoArraigo);
    document.getElementById('btnBorrarMemoria').addEventListener('click', borrarMemoria);

    // Inicio
    const cargado = cargarEstado();
    if (!cargado) {
        status('📝 Dibuja o carga archivo');
        renderTabla();
        actualizarCatalogo();
    } else {
        status('🔄 Datos recuperados');
        actualizarCatalogo();
    }
</script>
